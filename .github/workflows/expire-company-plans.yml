name: Expire company plans

on:
  schedule:
    - cron: "15 7 * * *"
  workflow_dispatch:

jobs:
  expire-company-plans:
    runs-on: ubuntu-latest

    steps:
      - name: Call Supabase Edge Function
        run: |
          curl -X POST "${{ secrets.SUPABASE_PROJECT_URL }}/functions/v1/expire-company-plans" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{}'
